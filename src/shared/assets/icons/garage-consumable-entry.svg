<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bottle body -->
  <rect x="5.5" y="7" width="7" height="9" rx="1.2" stroke="black" stroke-width="1.05"/>
  <!-- Bottle neck -->
  <rect x="7" y="4.5" width="4" height="3" rx="0.8" stroke="black" stroke-width="1"/>
  <!-- Bottle cap -->
  <rect x="6.5" y="3" width="5" height="2" rx="0.7" stroke="black" stroke-width="0.95"/>
  <!-- Liquid level line -->
  <line x1="5.5" y1="11.5" x2="12.5" y2="11.5" stroke="black" stroke-width="0.85" stroke-dasharray="1.5 1"/>
  <!-- Plus badge top-right -->
  <circle cx="14.5" cy="4" r="2.8" stroke="black" stroke-width="0.95" fill="white"/>
  <line x1="14.5" y1="2.5" x2="14.5" y2="5.5" stroke="black" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="13" y1="4" x2="16" y2="4" stroke="black" stroke-width="0.9" stroke-linecap="round"/>
</svg>
