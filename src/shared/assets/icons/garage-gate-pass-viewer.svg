<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card/pass base -->
  <rect x="1.5" y="3.75" width="15" height="10.5" rx="1.2" stroke="black" stroke-width="1.1"/>
  <!-- Magnetic strip top -->
  <rect x="1.5" y="5.25" width="15" height="1.8" fill="black" opacity="0.18"/>
  <!-- Chip square -->
  <rect x="3" y="8.25" width="3" height="2.25" rx="0.5" stroke="black" stroke-width="0.9"/>
  <!-- Chip lines -->
  <line x1="4.5" y1="8.25" x2="4.5" y2="10.5" stroke="black" stroke-width="0.6"/>
  <line x1="3" y1="9.375" x2="6" y2="9.375" stroke="black" stroke-width="0.6"/>
  <!-- Text lines on right -->
  <line x1="7.5" y1="8.5" x2="14" y2="8.5" stroke="black" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="7.5" y1="10.25" x2="11.5" y2="10.25" stroke="black" stroke-width="0.9" stroke-linecap="round"/>
</svg>
